<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta — Spinassi Chocolates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/conta.css">
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
<header class="acc-header">
    <a href="index.html" class="acc-logo">Spinassi <span>Chocolate</span></a>
    <div class="acc-header-right">
        <a href="index.html" class="acc-back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Voltar à loja
        </a>
    </div>
</header>

<!-- ── LAYOUT ─────────────────────────────────────────── -->
<div class="acc-layout">

    <!-- SIDEBAR -->
    <aside class="acc-sidebar" id="sidebarMount"></aside>

    <!-- CONTEÚDO -->
    <main class="acc-main">
        <h1 class="acc-page-title">Minha Conta</h1>
        <p class="acc-page-subtitle">Gerencie seus dados pessoais e preferências</p>

        <!-- ── DADOS PESSOAIS ────────────────────────── -->
        <div class="acc-card">
            <div class="acc-card-header">
                <h3>Dados Pessoais</h3>
                <span class="acc-member-since" id="memberSince"></span>
            </div>
            <div class="acc-card-body">
                <div class="acc-alert" id="alertPerfil"></div>

                <!-- Skeleton de carregamento -->
                <div id="perfilSkeleton" class="acc-skeleton-wrap">
                    <div class="acc-skeleton-grid">
                        <div class="acc-skeleton-field"><div class="skel-label"></div><div class="skel-input"></div></div>
                        <div class="acc-skeleton-field"><div class="skel-label"></div><div class="skel-input"></div></div>
                        <div class="acc-skeleton-field full"><div class="skel-label"></div><div class="skel-input"></div></div>
                        <div class="acc-skeleton-field"><div class="skel-label"></div><div class="skel-input"></div></div>
                        <div class="acc-skeleton-field"><div class="skel-label"></div><div class="skel-input"></div></div>
                        <div class="acc-skeleton-field"><div class="skel-label"></div><div class="skel-input"></div></div>
                    </div>
                </div>

                <form id="formPerfil" onsubmit="salvarPerfil(event)" style="display:none;">
                    <div class="acc-form-grid">

                        <div class="acc-field">
                            <label for="fNome">Nome <span class="req">*</span></label>
                            <input type="text" id="fNome" maxlength="80" required>
                        </div>

                        <div class="acc-field">
                            <label for="fSobrenome">Sobrenome <span class="req">*</span></label>
                            <input type="text" id="fSobrenome" maxlength="80" required>
                        </div>

                        <div class="acc-field full">
                            <label for="fEmail">E-mail</label>
                            <input type="email" id="fEmail" disabled>
                            <span class="acc-field-hint">O e-mail não pode ser alterado.</span>
                        </div>

                        <div class="acc-field">
                            <label for="fTelefone">Telefone</label>
                            <input type="tel" id="fTelefone" maxlength="20" placeholder="(00) 00000-0000">
                        </div>

                        <div class="acc-field">
                            <label for="fCpf">CPF</label>
                            <input type="text" id="fCpf" maxlength="14" placeholder="000.000.000-00">
                            <span class="acc-field-hint">Usado para emissão de notas fiscais.</span>
                        </div>

                        <div class="acc-field">
                            <label for="fGenero">Gênero</label>
                            <select id="fGenero">
                                <option value="">Prefiro não informar</option>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                                <option value="NB">Não-binário</option>
                                <option value="ND">Outro</option>
                            </select>
                        </div>

                        <div class="acc-field full" style="display:flex;align-items:center;gap:10px;">
                            <input type="checkbox" id="fNews" style="width:auto;">
                            <label for="fNews" style="text-transform:none;letter-spacing:0;font-size:.84rem;color:var(--text-dark);margin:0;">
                                Quero receber novidades e promoções por e-mail
                            </label>
                        </div>

                    </div>

                    <div style="margin-top:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                        <button type="submit" class="btn-gold" id="btnSalvarPerfil">
                            <span>Salvar alterações</span>
                        </button>
                        <button type="button" class="btn-outline" id="btnCancelar" onclick="cancelarEdicao()" style="display:none;">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ── ALTERAR SENHA ─────────────────────────── -->
        <div class="acc-card" id="secSenha">
            <div class="acc-card-header">
                <h3>Alterar Senha</h3>
            </div>
            <div class="acc-card-body">
                <div class="acc-alert" id="alertSenha"></div>

                <form id="formSenha" onsubmit="alterarSenha(event)">
                    <div class="acc-form-grid">

                        <div class="acc-field full">
                            <label for="fSenhaAtual">Senha atual</label>
                            <div class="acc-pass-wrap">
                                <input type="password" id="fSenhaAtual" autocomplete="current-password" required>
                                <button type="button" class="acc-eye-btn" onclick="toggleEye('fSenhaAtual','eye1')">
                                    <svg id="eye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="acc-field">
                            <label for="fNovaSenha">Nova senha</label>
                            <div class="acc-pass-wrap">
                                <input type="password" id="fNovaSenha" autocomplete="new-password"
                                       oninput="calcStrength(this.value)" required>
                                <button type="button" class="acc-eye-btn" onclick="toggleEye('fNovaSenha','eye2')">
                                    <svg id="eye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
                            <span class="strength-text" id="strengthText">Mínimo 8 caracteres</span>
                        </div>

                        <div class="acc-field">
                            <label for="fConfirmaSenha">Confirmar nova senha</label>
                            <div class="acc-pass-wrap">
                                <input type="password" id="fConfirmaSenha" autocomplete="new-password" required>
                                <button type="button" class="acc-eye-btn" onclick="toggleEye('fConfirmaSenha','eye3')">
                                    <svg id="eye3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                    </div>

                    <div style="margin-top:24px;">
                        <button type="submit" class="btn-gold" id="btnAlterarSenha">
                            <span>Alterar senha</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
/* ============================================================
   MINHA CONTA — lógica completa
============================================================ */

/* ── Guard: redireciona se não houver token ─────────────── */
(function () {
    if (!SpinassiAPI.sessao.getToken()) {
        window.location.replace('login.html');
    }
})();

/* ── Estado original do formulário (para detectar mudanças) */
let _perfilOriginal = null;

/* ── Preenche os campos com qualquer objeto de dados ────── */
function preencherFormulario(p) {
    document.getElementById('fNome').value      = p.nome      || '';
    document.getElementById('fSobrenome').value = p.sobrenome || '';
    document.getElementById('fEmail').value     = p.email     || '';
    document.getElementById('fTelefone').value  = p.telefone  || '';
    document.getElementById('fCpf').value       = p.cpf       || '';
    document.getElementById('fGenero').value    = p.genero    || '';
    document.getElementById('fNews').checked    = !!p.aceita_news;

    /* Exibe data de membro */
    if (p.criado_em) {
        const dt  = new Date(p.criado_em);
        const fmt = dt.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        document.getElementById('memberSince').textContent = `Membro desde ${fmt}`;
    }

    /* Guarda cópia para comparação ao salvar */
    _perfilOriginal = {
        nome:        p.nome      || '',
        sobrenome:   p.sobrenome || '',
        telefone:    p.telefone  || '',
        cpf:         p.cpf       || '',
        genero:      p.genero    || '',
        aceita_news: !!p.aceita_news,
    };
}

/* ── Carrega perfil: cache instantâneo + banco de dados ─── */
async function carregarPerfil() {
    const skeleton = document.getElementById('perfilSkeleton');
    const form     = document.getElementById('formPerfil');

    /* 1. Preenche instantaneamente com o cache do localStorage
          (dados salvos no login — nome, email, tipo)
          para o formulário aparecer preenchido sem esperar a API */
    const cache = SpinassiAPI.sessao.getUsuario();
    if (cache) {
        preencherFormulario(cache);
        skeleton.style.display = 'none';
        form.style.display     = 'block';
    }

    /* 2. Busca os dados COMPLETOS do banco de dados
          (cpf, telefone, genero, aceita_news, criado_em…)
          e atualiza os campos com a informação mais atual */
    try {
        const res = await SpinassiAPI.auth.perfil();
        const p   = res.data;

        preencherFormulario(p);

        skeleton.style.display = 'none';
        form.style.display     = 'block';

        /* Atualiza o cache do localStorage com os dados completos */
        const usuarioAtualizado = { ...(cache || {}), ...p };
        localStorage.setItem('sc_user', JSON.stringify(usuarioAtualizado));

        /* Registra listener para mostrar botão Cancelar ao editar */
        form.querySelectorAll('input:not([disabled]), select').forEach(el => {
            el.addEventListener('input',  mostrarBotaoCancelar);
            el.addEventListener('change', mostrarBotaoCancelar);
        });

    } catch (e) {
        skeleton.style.display = 'none';
        form.style.display     = 'block';
        if (!cache) {
            /* Só mostra erro se nem o cache estava disponível */
            showAlert('alertPerfil', 'Não foi possível carregar seus dados. Tente recarregar a página.', 'error');
        }
    }
}

/* ── Mostra/esconde botão Cancelar ──────────────────────── */
function mostrarBotaoCancelar() {
    document.getElementById('btnCancelar').style.display = 'inline-flex';
}

/* ── Restaura valores originais ─────────────────────────── */
function cancelarEdicao() {
    if (!_perfilOriginal) return;
    document.getElementById('fNome').value      = _perfilOriginal.nome;
    document.getElementById('fSobrenome').value = _perfilOriginal.sobrenome;
    document.getElementById('fTelefone').value  = _perfilOriginal.telefone;
    document.getElementById('fCpf').value       = _perfilOriginal.cpf;
    document.getElementById('fGenero').value    = _perfilOriginal.genero;
    document.getElementById('fNews').checked    = _perfilOriginal.aceita_news;
    document.getElementById('btnCancelar').style.display = 'none';
    showAlert('alertPerfil', 'Alterações descartadas.', 'info');
}

/* ── Salva perfil no banco de dados ─────────────────────── */
async function salvarPerfil(e) {
    e.preventDefault();

    const novosDados = {
        nome:        document.getElementById('fNome').value.trim(),
        sobrenome:   document.getElementById('fSobrenome').value.trim(),
        telefone:    document.getElementById('fTelefone').value.trim() || null,
        cpf:         document.getElementById('fCpf').value.trim() || null,
        genero:      document.getElementById('fGenero').value || null,
        aceita_news: document.getElementById('fNews').checked,
    };

    /* Descobre quais campos foram alterados */
    const alterados = Object.keys(novosDados).filter(k => {
        const orig = _perfilOriginal?.[k] ?? '';
        const novo = novosDados[k] ?? '';
        return String(orig) !== String(novo);
    });

    if (alterados.length === 0) {
        showAlert('alertPerfil', 'Nenhuma alteração detectada.', 'info');
        return;
    }

    const btn = document.getElementById('btnSalvarPerfil');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Salvando…';

    try {
        await SpinassiAPI.auth.atualizarPerfil(novosDados);

        /* Nomes legíveis dos campos alterados */
        const labels = {
            nome: 'Nome', sobrenome: 'Sobrenome', telefone: 'Telefone',
            cpf: 'CPF', genero: 'Gênero', aceita_news: 'Newsletter',
        };
        const lista = alterados.map(k => labels[k] || k).join(', ');
        showAlert('alertPerfil', `Salvo com sucesso! Campos atualizados: ${lista}.`, 'success');

        /* Atualiza sessão local com os novos dados */
        const u = SpinassiAPI.sessao.getUsuario();
        if (u) {
            Object.assign(u, novosDados);
            localStorage.setItem('sc_user', JSON.stringify(u));
        }

        /* Atualiza estado original e esconde Cancelar */
        _perfilOriginal = { ...novosDados,
            telefone: novosDados.telefone || '',
            cpf:      novosDados.cpf      || '',
            genero:   novosDados.genero   || '',
        };
        document.getElementById('btnCancelar').style.display = 'none';

    } catch (err) {
        showAlert('alertPerfil', err.message || 'Erro ao salvar. Tente novamente.', 'error');
    } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Salvar alterações';
    }
}

/* ── Altera senha ───────────────────────────────────────── */
async function alterarSenha(e) {
    e.preventDefault();
    const atual    = document.getElementById('fSenhaAtual').value;
    const nova     = document.getElementById('fNovaSenha').value;
    const confirma = document.getElementById('fConfirmaSenha').value;

    if (nova.length < 8) {
        showAlert('alertSenha', 'A nova senha deve ter ao menos 8 caracteres.', 'error');
        return;
    }
    if (nova !== confirma) {
        showAlert('alertSenha', 'As senhas não coincidem.', 'error');
        return;
    }

    const btn = document.getElementById('btnAlterarSenha');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Alterando…';

    try {
        await SpinassiAPI.auth.alterarSenha(atual, nova);
        showAlert('alertSenha', 'Senha alterada com sucesso!', 'success');
        document.getElementById('formSenha').reset();
        document.getElementById('strengthFill').style.width = '0%';
        document.getElementById('strengthText').textContent = 'Mínimo 8 caracteres';
    } catch (err) {
        showAlert('alertSenha', err.message || 'Erro ao alterar senha.', 'error');
    } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Alterar senha';
    }
}

/* ── Helpers visuais ────────────────────────────────────── */
function showAlert(id, msg, tipo) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className   = `acc-alert show ${tipo}`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (tipo !== 'error') setTimeout(() => el.classList.remove('show'), 6000);
}

function toggleEye(inputId, iconId) {
    const input  = document.getElementById(inputId);
    const icon   = document.getElementById(iconId);
    const isPass = input.type === 'password';
    input.type   = isPass ? 'text' : 'password';
    icon.innerHTML = isPass
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
}

function calcStrength(v) {
    let s = 0;
    if (v.length >= 8)          s++;
    if (/[A-Z]/.test(v))        s++;
    if (/[0-9]/.test(v))        s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const lvls = [
        { w: '0%',   bg: '#E0D8D0', t: 'Mínimo 8 caracteres' },
        { w: '30%',  bg: '#E74C3C', t: 'Fraca'                },
        { w: '55%',  bg: '#F39C12', t: 'Média'                },
        { w: '80%',  bg: '#27AE60', t: 'Forte'                },
        { w: '100%', bg: '#D4AF37', t: 'Muito forte'          },
    ];
    const l    = v.length ? lvls[s] : lvls[0];
    const fill = document.getElementById('strengthFill');
    fill.style.width      = v.length ? l.w : '0%';
    fill.style.background = l.bg;
    document.getElementById('strengthText').textContent = v.length ? l.t : 'Mínimo 8 caracteres';
}

/* ── Inicia ─────────────────────────────────────────────── */
carregarPerfil();
renderSidebar('minha-conta');
</script>
</body>
</html>
